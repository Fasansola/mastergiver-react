version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mastergiver_postgres
    restart: always
    environment:
      POSTGRES_USER: mastergiver
      POSTGRES_PASSWORD: localdev123
      POSTGRES_DB: mastergiver_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mastergiver']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: